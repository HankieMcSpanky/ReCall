<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NeuroPack Settings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0d0d0d;color:#e8e6df;min-height:100vh;
  display:flex;justify-content:center;padding:40px 20px;
}
.container{width:100%;max-width:480px}
h1{font-size:22px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
h1 span{color:#6c63ff}
.subtitle{color:#6b6960;font-size:13px;margin-bottom:28px}
.field{margin-bottom:18px}
label{display:block;font-size:12px;color:#a09e95;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
input[type="text"],input[type="url"],input[type="password"]{
  width:100%;padding:10px 12px;background:#161622;
  border:1px solid #2a2a3e;border-radius:6px;color:#e8e6df;font-size:14px;outline:none;
  font-family:inherit;
}
input:focus{border-color:#6c63ff}
.toggle-group{margin-bottom:18px}
.toggle-group h3{font-size:12px;color:#a09e95;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px}
.toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;background:#161622;border:1px solid #2a2a3e;
  border-radius:6px;margin-bottom:4px;
}
.toggle span{font-size:13px}
.switch{position:relative;width:36px;height:20px;cursor:pointer}
.switch input{opacity:0;width:0;height:0}
.slider{
  position:absolute;inset:0;background:#2a2a3e;border-radius:10px;transition:0.2s;
}
.slider:before{
  content:"";position:absolute;width:16px;height:16px;left:2px;bottom:2px;
  background:#666;border-radius:50%;transition:0.2s;
}
.switch input:checked+.slider{background:#6c63ff}
.switch input:checked+.slider:before{transform:translateX(16px);background:#fff}
.actions{display:flex;gap:8px;margin-top:24px}
.btn{
  padding:10px 20px;border:none;border-radius:6px;font-size:13px;font-weight:500;
  cursor:pointer;font-family:inherit;
}
.btn-primary{background:#6c63ff;color:#fff}
.btn-primary:hover{background:#8b83ff}
.btn-secondary{background:#161622;color:#e8e6df;border:1px solid #2a2a3e}
.btn-secondary:hover{border-color:#6c63ff}
.status-msg{margin-top:12px;font-size:12px;padding:8px 12px;border-radius:6px;display:none}
.status-msg.ok{display:block;background:rgba(34,197,94,0.15);color:#22c55e}
.status-msg.err{display:block;background:rgba(239,68,68,0.15);color:#ef4444}
</style>
</head>
<body>
<div class="container">
  <h1><span>NP</span> NeuroPack Settings</h1>
  <p class="subtitle">Configure your NeuroPack connection</p>

  <div class="field">
    <label>Server URL</label>
    <input type="url" id="server-url" placeholder="http://localhost:7341">
  </div>

  <div class="field">
    <label>Auth Token (optional)</label>
    <input type="password" id="auth-token" placeholder="Leave empty if auth is disabled">
  </div>

  <div class="toggle-group">
    <h3>Enabled Sites</h3>
    <div class="toggle">
      <span>ChatGPT</span>
      <label class="switch"><input type="checkbox" id="site-chatgpt" checked><span class="slider"></span></label>
    </div>
    <div class="toggle">
      <span>Claude</span>
      <label class="switch"><input type="checkbox" id="site-claude" checked><span class="slider"></span></label>
    </div>
    <div class="toggle">
      <span>Gemini</span>
      <label class="switch"><input type="checkbox" id="site-gemini" checked><span class="slider"></span></label>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="save-btn">Save Settings</button>
    <button class="btn btn-secondary" id="test-btn">Test Connection</button>
  </div>

  <div class="status-msg" id="status-msg"></div>
</div>

<script src="options.js"></script>
</body>
</html>
