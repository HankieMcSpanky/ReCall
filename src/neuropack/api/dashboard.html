<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroPack</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--bg2:#161622;--bg3:#1e1e30;--bg4:#282840;
  --accent:#6c63ff;--accent2:#8b83ff;--accent-dim:rgba(108,99,255,0.15);
  --text:#e8e6df;--text2:#a09e95;--text3:#6b6960;
  --red:#ef4444;--green:#22c55e;--border:#2a2a3e;
  --radius:10px;--radius-sm:6px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}

/* Layout */
.app{max-width:960px;margin:0 auto;padding:16px 20px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.header h1{font-size:20px;font-weight:600;display:flex;align-items:center;gap:8px}
.header h1 span{color:var(--accent)}
.status{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.dot.ok{background:var(--green)}

/* Stats bar */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px}
.stat .label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat .value{font-size:20px;font-weight:600}

/* Search */
.search-box{position:relative;margin-bottom:16px}
.search-box input{width:100%;padding:12px 16px 12px 40px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:15px;outline:none;transition:border-color 0.2s}
.search-box input:focus{border-color:var(--accent)}
.search-box input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:16px;pointer-events:none}

/* Save form */
.save-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:20px;display:none}
.save-form.open{display:block}
.save-form textarea{width:100%;height:80px;padding:10px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);resize:vertical;outline:none;margin-bottom:10px}
.save-form textarea:focus{border-color:var(--accent)}
.save-row{display:flex;gap:8px;align-items:center}
.save-row input{flex:1;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none}
.save-row input:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border-radius:var(--radius-sm);font-weight:500;font-size:13px;transition:background 0.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--text2)}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,0.1)}
.btn-toggle{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:8px 14px;border-radius:var(--radius-sm)}
.btn-toggle:hover{border-color:var(--accent);color:var(--text)}

/* Toolbar */
.toolbar{display:flex;gap:8px;margin-bottom:16px;align-items:center}
.toolbar .spacer{flex:1}
.count{font-size:13px;color:var(--text3)}

/* Memory list */
.memory-list{display:flex;flex-direction:column;gap:8px}
.memory-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color 0.15s}
.memory-card:hover{border-color:var(--accent)}
.memory-card.expanded{border-color:var(--accent);background:var(--bg3)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.card-l3{font-size:14px;font-weight:500;line-height:1.4;flex:1}
.card-meta{display:flex;gap:6px;align-items:center;flex-shrink:0}
.card-score{font-size:11px;color:var(--accent);background:var(--accent-dim);padding:2px 6px;border-radius:3px;font-weight:600}
.card-date{font-size:11px;color:var(--text3)}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg4);color:var(--text2)}
.card-detail{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);display:none}
.card-detail.show{display:block}
.card-detail h4{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.card-detail ul{list-style:none;margin-bottom:12px}
.card-detail li{font-size:13px;color:var(--text2);padding:3px 0;padding-left:14px;position:relative}
.card-detail li::before{content:"\2022";position:absolute;left:0;color:var(--accent)}
.card-detail .full-text{font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap;background:var(--bg);padding:12px;border-radius:var(--radius-sm);max-height:300px;overflow-y:auto;margin-bottom:12px}
.card-actions{display:flex;gap:8px;justify-content:flex-end}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:var(--radius-sm);color:#fff;font-size:14px;z-index:9999;animation:fadeIn 0.3s ease;pointer-events:none}
.toast.success{background:var(--accent)}
.toast.error{background:var(--red)}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty h3{font-size:16px;margin-bottom:6px;color:var(--text2)}

/* Loading */
.loading{text-align:center;padding:30px;color:var(--text3)}

/* Responsive */
@media(max-width:600px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .save-row{flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <h1><span>NP</span> NeuroPack</h1>
    <div class="status">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-bar">
    <div class="stat"><div class="label">Memories</div><div class="value" id="stat-count">-</div></div>
    <div class="stat"><div class="label">Size</div><div class="value" id="stat-size">-</div></div>
    <div class="stat"><div class="label">Compression</div><div class="value" id="stat-ratio">-</div></div>
    <div class="stat"><div class="label">Latest</div><div class="value" id="stat-newest">-</div></div>
  </div>

  <!-- Search -->
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="search" id="search" placeholder="Search memories..." autocomplete="off">
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <button class="btn-toggle" id="toggle-save" title="Quick save">+ Save Memory</button>
    <div class="spacer"></div>
    <span class="count" id="result-count"></span>
  </div>

  <!-- Save Form -->
  <div class="save-form" id="save-form">
    <textarea id="save-content" placeholder="What do you want to remember?"></textarea>
    <div class="save-row">
      <input type="text" id="save-tags" placeholder="Tags (comma separated)">
      <button class="btn btn-primary" id="save-btn">Save</button>
    </div>
  </div>

  <!-- Memory List -->
  <div id="memory-list" class="memory-list">
    <div class="loading">Loading memories...</div>
  </div>
</div>

<script>
(function(){
"use strict";

const TOKEN = "__NP_AUTH_TOKEN__";
let searchTimer = null;

function headers() {
  const h = {"Content-Type": "application/json"};
  if (TOKEN) h["Authorization"] = "Bearer " + TOKEN;
  return h;
}

async function api(method, path, body) {
  const opts = {method, headers: headers()};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(r.status + " " + r.statusText);
  return r.json();
}

function relTime(iso) {
  const d = new Date(iso);
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60) + "m ago";
  if (s < 86400) return Math.floor(s/3600) + "h ago";
  if (s < 2592000) return Math.floor(s/86400) + "d ago";
  return d.toLocaleDateString();
}

function fmtBytes(b) {
  if (b < 1024) return b + " B";
  if (b < 1048576) return (b/1024).toFixed(1) + " KB";
  return (b/1048576).toFixed(1) + " MB";
}

function toast(msg, type) {
  const el = document.createElement("div");
  el.className = "toast " + (type || "success");
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

async function loadStats() {
  try {
    const s = await api("GET", "/v1/stats");
    document.getElementById("stat-count").textContent = s.total_memories;
    document.getElementById("stat-size").textContent = fmtBytes(s.total_size_bytes);
    document.getElementById("stat-ratio").textContent = s.avg_compression_ratio + "x";
    document.getElementById("stat-newest").textContent = s.newest ? relTime(s.newest) : "-";
  } catch(e) {}
}

async function checkHealth() {
  try {
    await api("GET", "/health");
    document.getElementById("status-dot").className = "dot ok";
    document.getElementById("status-text").textContent = "Connected";
  } catch {
    document.getElementById("status-dot").className = "dot";
    document.getElementById("status-text").textContent = "Disconnected";
  }
}

function renderCard(item, isSearch) {
  const card = document.createElement("div");
  card.className = "memory-card";
  card.dataset.id = item.id;

  const l3 = item.l3_abstract || item.content_preview || "";
  const tags = item.tags || [];
  const date = item.created_at || "";
  const score = isSearch && item.score !== undefined ? item.score : null;

  let metaHtml = "";
  if (score !== null) metaHtml += '<span class="card-score">' + score.toFixed(3) + '</span>';
  if (date) metaHtml += '<span class="card-date">' + relTime(date) + '</span>';

  let tagsHtml = tags.map(t => '<span class="tag">' + esc(t) + '</span>').join("");

  card.innerHTML =
    '<div class="card-header"><div class="card-l3">' + esc(l3) + '</div><div class="card-meta">' + metaHtml + '</div></div>' +
    (tagsHtml ? '<div class="card-tags">' + tagsHtml + '</div>' : '') +
    '<div class="card-detail" id="detail-' + item.id + '"></div>';

  card.addEventListener("click", () => toggleDetail(item.id, card));
  return card;
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

async function toggleDetail(id, card) {
  const det = document.getElementById("detail-" + id);
  if (det.classList.contains("show")) {
    det.classList.remove("show");
    card.classList.remove("expanded");
    return;
  }

  // Collapse others
  document.querySelectorAll(".card-detail.show").forEach(d => {
    d.classList.remove("show");
    d.closest(".memory-card").classList.remove("expanded");
  });

  try {
    const m = await api("GET", "/v1/memories/" + id);
    const facts = (m.l2_facts || []).map(f => "<li>" + esc(f) + "</li>").join("");
    det.innerHTML =
      '<h4>Key Facts</h4><ul>' + facts + '</ul>' +
      '<h4>Full Content</h4><div class="full-text">' + esc(m.content) + '</div>' +
      '<div class="card-actions">' +
        '<button class="btn btn-danger" onclick="event.stopPropagation();NP.del(\'' + id + '\')">Delete</button>' +
      '</div>';
    det.classList.add("show");
    card.classList.add("expanded");
  } catch(e) {
    toast("Failed to load details", "error");
  }
}

async function search(query) {
  const list = document.getElementById("memory-list");
  if (query.length < 2) {
    await loadRecent();
    return;
  }
  list.innerHTML = '<div class="loading">Searching...</div>';
  try {
    const data = await api("POST", "/v1/recall", {query, limit: 30});
    list.innerHTML = "";
    document.getElementById("result-count").textContent = data.count + " result" + (data.count !== 1 ? "s" : "");
    if (data.results.length === 0) {
      list.innerHTML = '<div class="empty"><h3>No results</h3>Try a different search</div>';
      return;
    }
    data.results.forEach(r => list.appendChild(renderCard(r, true)));
  } catch(e) {
    list.innerHTML = '<div class="empty"><h3>Search failed</h3></div>';
  }
}

async function loadRecent() {
  const list = document.getElementById("memory-list");
  list.innerHTML = '<div class="loading">Loading...</div>';
  try {
    const data = await api("GET", "/v1/memories?limit=30");
    list.innerHTML = "";
    document.getElementById("result-count").textContent = data.length + " memor" + (data.length !== 1 ? "ies" : "y");
    if (data.length === 0) {
      list.innerHTML = '<div class="empty"><h3>No memories yet</h3>Save your first memory above</div>';
      return;
    }
    data.forEach(m => list.appendChild(renderCard(m, false)));
  } catch(e) {
    list.innerHTML = '<div class="empty"><h3>Cannot connect to server</h3></div>';
  }
}

async function save() {
  const content = document.getElementById("save-content").value.trim();
  if (!content) return;
  const tagsStr = document.getElementById("save-tags").value.trim();
  const tags = tagsStr ? tagsStr.split(",").map(t => t.trim()).filter(Boolean) : [];
  try {
    await api("POST", "/v1/memories", {content, tags, source: "dashboard"});
    document.getElementById("save-content").value = "";
    document.getElementById("save-tags").value = "";
    toast("Memory saved!");
    await loadStats();
    if (!document.getElementById("search").value.trim()) await loadRecent();
  } catch(e) {
    toast("Save failed: " + e.message, "error");
  }
}

async function del(id) {
  if (!confirm("Delete this memory?")) return;
  try {
    await api("DELETE", "/v1/memories/" + id);
    toast("Memory deleted");
    const card = document.querySelector('[data-id="' + id + '"]');
    if (card) card.remove();
    await loadStats();
  } catch(e) {
    toast("Delete failed", "error");
  }
}

// Expose for onclick handlers
window.NP = {del};

// Init
document.addEventListener("DOMContentLoaded", async () => {
  await checkHealth();
  await loadStats();
  await loadRecent();

  document.getElementById("search").addEventListener("input", (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => search(e.target.value.trim()), 300);
  });

  document.getElementById("toggle-save").addEventListener("click", () => {
    document.getElementById("save-form").classList.toggle("open");
  });

  document.getElementById("save-btn").addEventListener("click", save);

  document.getElementById("save-content").addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) save();
  });
});
})();
</script>
</body>
</html>
